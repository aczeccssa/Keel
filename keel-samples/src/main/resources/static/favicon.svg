<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
    <defs>
        <style>
            /* --- Light Mode (Default) matching Keel UI --- */
            .bg-squircle {
            fill: #f8f3ea;
            stroke: #d9cfbf;
            stroke-width: 2;
            }

            .edge-main {
            stroke: #0f766e;
            stroke-width: 12;
            stroke-linecap: round;
            }

            .edge-flow {
            stroke: #b45309;
            stroke-width: 12;
            stroke-linecap: round;
            /* Creates the "data packet" dotted flow effect */
            stroke-dasharray: 0 14;
            }

            .node-main { fill: #0f766e; }
            .node-flow { fill: #b45309; }
            .node-inner { fill: #f8f3ea; } /* Matches bg to create ring effect */

            /* Active Node Pulse Animation */
            .pulse-ring {
            fill: none;
            stroke: #b45309;
            stroke-width: 2;
            opacity: 0.6;
            animation: pulse-anim 2s infinite cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: 80px 94px;
            }

            @keyframes pulse-anim {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(1.8); opacity: 0; }
            }

            /* --- Dark Mode Auto-Adaptation for Browser Tabs --- */
            @media (prefers-color-scheme: dark) {
            .bg-squircle {
            fill: #0f172a;
            stroke: #334155;
            }
            .edge-main { stroke: #2dd4bf; }
            .edge-flow { stroke: #fbbf24; }

            .node-main { fill: #2dd4bf; }
            .node-flow { fill: #fbbf24; }
            .node-inner { fill: #0f172a; } /* Matches dark bg */

            .pulse-ring { stroke: #fbbf24; }
            }
        </style>
    </defs>

    <!-- App Icon Background Squircle -->
    <rect class="bg-squircle" x="4" y="4" width="112" height="112" rx="28" />

    <!-- Edges (Network Links forming the 'K') -->
    <!-- Left Vertical Spine (Keel Core) -->
    <line class="edge-main" x1="40" y1="26" x2="40" y2="94" />

    <!-- Top Right Arm (Static Plugin) -->
    <line class="edge-main" x1="40" y1="60" x2="80" y2="26" />

    <!-- Bottom Right Arm (Active Data Flow) -->
    <line class="edge-flow" x1="40" y1="60" x2="80" y2="94" />

    <!-- Nodes (Topology Endpoints overlaying the lines) -->

    <!-- Core Top -->
    <circle class="node-main" cx="40" cy="26" r="12" />
    <circle class="node-inner" cx="40" cy="26" r="5" />

    <!-- Center Router/Junction -->
    <circle class="node-main" cx="40" cy="60" r="10" />

    <!-- Core Bottom -->
    <circle class="node-main" cx="40" cy="94" r="12" />
    <circle class="node-inner" cx="40" cy="94" r="5" />

    <!-- Plugin Node (Top Right) -->
    <circle class="node-main" cx="80" cy="26" r="12" />
    <circle class="node-inner" cx="80" cy="26" r="5" />

    <!-- Active Flow Node (Bottom Right) -->
    <circle class="pulse-ring" cx="80" cy="94" r="14" />
    <circle class="node-flow" cx="80" cy="94" r="14" />
    <circle class="node-inner" cx="80" cy="94" r="6" />
    <circle class="node-flow" cx="80" cy="94" r="3" />

</svg>
