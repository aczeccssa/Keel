name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup JDK 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "23"
          cache: gradle

      - name: Build and Test
        run: ./gradlew build dokkaGenerate

      - name: Test keel-samples fixtures demos (PR gate)
        run: ./gradlew :keel-samples:test --no-daemon --console=plain

      - name: Test keel-test-fixtures (explicit gate)
        run: ./gradlew :keel-test-fixtures:test --rerun-tasks --no-daemon --console=plain

      - name: Validate keel-test-fixtures publish artifacts
        run: ./gradlew :keel-test-fixtures:publishToMavenLocal --no-daemon --console=plain

      - name: Stress test keel-test-fixtures (60 rounds)
        run: ./gradlew :keel-test-fixtures:stressTest --no-daemon --console=plain

      - name: Performance Benchmarks (CI Gate)
        run: ./gradlew :keel-test-suite:test --tests "com.keel.test.perf.*" --info

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests
            **/build/test-results
