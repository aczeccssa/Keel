<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Keel Observability Plugin</title>
    <style>
      :root {
        --paper: #f4efe6;
        --ink: #1f2937;
        --muted: #6b7280;
        --line: #d9cfbf;
        --card: rgba(255, 252, 247, 0.9);
        --accent: #0f766e;
        --accent-2: #b45309;
        --ok: #166534;
        --warn: #b45309;
        --bad: #b91c1c;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Avenir Next", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 32%),
          radial-gradient(circle at top right, rgba(180, 83, 9, 0.12), transparent 26%),
          linear-gradient(180deg, #f8f3ea 0%, var(--paper) 100%);
      }
      header {
        padding: 28px 32px 20px;
        border-bottom: 1px solid var(--line);
      }
      h1 {
        margin: 0;
        font-size: clamp(28px, 5vw, 42px);
        letter-spacing: -0.04em;
      }
      header p {
        margin: 8px 0 0;
        max-width: 820px;
        color: var(--muted);
      }
      main {
        padding: 24px 32px 40px;
        display: grid;
        grid-template-columns: 1.2fr 0.8fr;
        gap: 18px;
      }
      section {
        background: var(--card);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(217, 207, 191, 0.92);
        border-radius: 18px;
        padding: 18px;
        box-shadow: 0 18px 40px rgba(80, 57, 33, 0.08);
      }
      section h2 {
        margin: 0 0 14px;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }
      .stack { display: grid; gap: 18px; }
      .topology {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      }
      .node, .trace, .panel {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px;
        background: rgba(255, 255, 255, 0.74);
      }
      .node h3, .panel strong { margin: 0 0 6px; font-size: 15px; }
      .meta { color: var(--muted); font-size: 12px; }
      .pill {
        display: inline-block;
        margin: 0 6px 6px 0;
        padding: 3px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
      }
      .pill.ok { background: rgba(22, 101, 52, 0.12); color: var(--ok); }
      .pill.warn { background: rgba(180, 83, 9, 0.14); color: var(--warn); }
      .pill.bad { background: rgba(185, 28, 28, 0.12); color: var(--bad); }
      .flow { display: grid; gap: 10px; }
      .flow-row {
        display: grid;
        grid-template-columns: 140px 1fr 140px;
        align-items: center;
        gap: 12px;
        font-size: 13px;
      }
      .edge {
        position: relative;
        height: 10px;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(15, 118, 110, 0.2), rgba(180, 83, 9, 0.26));
      }
      .edge::after {
        content: "";
        position: absolute;
        right: -1px;
        top: 50%;
        width: 10px;
        height: 10px;
        background: var(--accent-2);
        clip-path: polygon(0 0, 100% 50%, 0 100%);
        transform: translateY(-50%);
      }
      .traces { display: grid; gap: 10px; max-height: 540px; overflow: auto; }
      .trace strong { display: block; font-size: 13px; }
      .trace small { color: var(--muted); display: block; margin-top: 2px; }
      .metrics { display: grid; gap: 10px; }
      .metric {
        display: flex;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid var(--line);
        font-size: 13px;
      }
      .metric:last-child { border-bottom: 0; }
      .panels { display: grid; gap: 10px; }
      @media (max-width: 920px) {
        main { grid-template-columns: 1fr; }
        .flow-row { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Keel Observability Plugin</h1>
      <p>
        This UI is served as a plugin static resource. Its data comes from plugin-owned JSON and SSE routes under
        <code>/api/plugins/observability</code>.
      </p>
    </header>
    <main>
      <div class="stack">
        <section>
          <h2>JVM Topology</h2>
          <div id="topology" class="topology"></div>
        </section>
        <section>
          <h2>Recent Data Flow</h2>
          <div id="flows" class="flow"></div>
        </section>
      </div>
      <div class="stack">
        <section>
          <h2>Trace Timeline</h2>
          <div id="traces" class="traces"></div>
        </section>
        <section>
          <h2>Metrics</h2>
          <div id="metrics" class="metrics"></div>
        </section>
        <section>
          <h2>Registered Panels</h2>
          <div id="panels" class="panels"></div>
        </section>
      </div>
    </main>
    <script>
      const state = { nodes: new Map(), traces: [], flows: [], panels: [] };

      function pillClass(status) {
        if (status === "HEALTHY" || status === "RUNNING") return "ok";
        if (status === "DEGRADED" || status === "STOPPED") return "warn";
        return "bad";
      }

      async function getJson(path) {
        const response = await fetch(path);
        if (!response.ok) throw new Error(`Request failed: ${path}`);
        return response.json();
      }

      function renderTopology() {
        const root = document.getElementById("topology");
        root.innerHTML = "";
        Array.from(state.nodes.values()).sort((a, b) => a.id.localeCompare(b.id)).forEach((node) => {
          const item = document.createElement("article");
          item.className = "node";
          item.innerHTML = `
            <h3>${node.label}</h3>
            <div>
              <span class="pill ${pillClass(node.healthState)}">${node.healthState || "UNKNOWN"}</span>
              <span class="pill ${pillClass(node.lifecycleState)}">${node.lifecycleState || "UNKNOWN"}</span>
            </div>
            <div class="meta">${node.runtimeMode || "IN_PROCESS"} · pid=${node.pid ?? "-"}</div>
            <div class="meta">inflight=${node.inflightInvocations || 0} · queue=${node.eventQueueDepth || 0}</div>
          `;
          root.appendChild(item);
        });
      }

      function renderFlows() {
        const root = document.getElementById("flows");
        root.innerHTML = "";
        state.flows.slice(-14).reverse().forEach((flow) => {
          const row = document.createElement("div");
          row.className = "flow-row";
          row.innerHTML = `
            <div><strong>${flow.edgeFrom}</strong></div>
            <div class="edge" title="${flow.operation}"></div>
            <div><strong>${flow.edgeTo}</strong></div>
          `;
          root.appendChild(row);
        });
      }

      function renderTraces() {
        const root = document.getElementById("traces");
        root.innerHTML = "";
        state.traces.slice(0, 30).forEach((trace) => {
          const row = document.createElement("article");
          row.className = "trace";
          row.innerHTML = `
            <strong>${trace.operation}</strong>
            <small>${trace.service} · status=${trace.status} · duration=${trace.durationMs ?? "-"}ms</small>
            <small>traceId=${trace.traceId}</small>
          `;
          root.appendChild(row);
        });
      }

      function renderMetrics() {
        const nodes = Array.from(state.nodes.values());
        const metrics = [
          ["JVM nodes", nodes.length],
          ["Inflight invokes", nodes.reduce((sum, node) => sum + (node.inflightInvocations || 0), 0)],
          ["Dropped logs", nodes.reduce((sum, node) => sum + (node.droppedLogCount || 0), 0)],
          ["Buffered traces", state.traces.length]
        ];
        const root = document.getElementById("metrics");
        root.innerHTML = metrics.map(([label, value]) => `<div class="metric"><span>${label}</span><strong>${value}</strong></div>`).join("");
      }

      function renderPanels() {
        const root = document.getElementById("panels");
        if (state.panels.length === 0) {
          root.innerHTML = `<div class="panel">No custom panels registered yet.</div>`;
          return;
        }
        root.innerHTML = state.panels.map((panel) => `
          <article class="panel">
            <strong>${panel.title}</strong>
            <div class="meta">${panel.dataEndpoint}</div>
          </article>
        `).join("");
      }

      function upsertNode(node) {
        state.nodes.set(node.id, node);
        renderTopology();
        renderMetrics();
      }

      function pushTrace(trace) {
        state.traces.unshift(trace);
        state.traces = state.traces.slice(0, 120);
        renderTraces();
        renderMetrics();
      }

      function pushFlow(flow) {
        state.flows.push(flow);
        state.flows = state.flows.slice(-120);
        renderFlows();
      }

      async function bootstrap() {
        const [topology, traces, flows, panels] = await Promise.all([
          getJson("/api/plugins/observability/topology"),
          getJson("/api/plugins/observability/traces?limit=40"),
          getJson("/api/plugins/observability/flows?limit=30"),
          getJson("/api/plugins/observability/panels")
        ]);
        (topology.data?.nodes || []).forEach(upsertNode);
        (traces.data?.spans || []).forEach(pushTrace);
        (flows.data?.flows || []).forEach(pushFlow);
        state.panels = panels.data?.panels || [];
        renderPanels();
      }

      function subscribe() {
        const source = new EventSource("/api/plugins/observability/stream");
        source.addEventListener("jvm_status", (event) => upsertNode(JSON.parse(event.data)));
        source.addEventListener("plugin_status", (event) => upsertNode(JSON.parse(event.data)));
        source.addEventListener("trace_event", (event) => pushTrace(JSON.parse(event.data)));
        source.addEventListener("flow_event", (event) => pushFlow(JSON.parse(event.data)));
        source.addEventListener("panel_update", (event) => {
          const panel = JSON.parse(event.data);
          state.panels = state.panels.filter((item) => item.id !== panel.id).concat(panel);
          renderPanels();
        });
      }

      bootstrap().then(subscribe).catch((error) => {
        console.error(error);
        document.getElementById("traces").innerHTML =
          `<article class="trace"><strong>Bootstrap failed</strong><small>${error.message}</small></article>`;
      });
    </script>
  </body>
</html>
