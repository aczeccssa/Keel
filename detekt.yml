build:
  maxIssues: 0

complexity:
  LongMethod:
    active: true
    threshold: 80
  LongParameterList:
    active: true
    functionThreshold: 8
    constructorThreshold: 9
  NestedBlockDepth:
    active: true
    threshold: 5
  TooManyFunctions:
    active: true
    thresholdInFiles: 20
    thresholdInClasses: 20
    thresholdInInterfaces: 20
    thresholdInObjects: 20
  CyclomaticComplexMethod:
    active: true
    threshold: 20

style:
  MagicNumber:
    active: false

comments:
  CommentOverPrivateFunction:
    active: false

naming:
  FunctionNaming:
    active: true
    functionPattern: '[a-z][A-Za-z0-9]*'
